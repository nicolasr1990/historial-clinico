<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Historia Clínica · Los Lapachos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0f1a;
    --bg-elevated: #111827;
    --surface: #1a2236;
    --surface-light: #243049;
    --border: rgba(255,255,255,0.06);
    --border-strong: rgba(255,255,255,0.10);
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent: #10b981;
    --accent-dim: rgba(16,185,129,0.12);
    --accent-glow: rgba(16,185,129,0.25);
    --accent-light: #34d399;
    --danger: #f43f5e;
    --danger-dim: rgba(244,63,94,0.12);
    --warning: #f59e0b;
    --warning-dim: rgba(245,158,11,0.12);
    --info: #3b82f6;
    --info-dim: rgba(59,130,246,0.12);
    --purple: #a78bfa;
    --purple-dim: rgba(167,139,250,0.12);
    --glass: rgba(17,24,39,0.75);
    --glass-border: rgba(255,255,255,0.08);
    --radius: 20px;
    --radius-lg: 24px;
    --radius-sm: 14px;
    --radius-xs: 10px;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.3);
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --shadow-lg: 0 12px 40px rgba(0,0,0,0.5);
    --shadow-glow: 0 0 30px rgba(16,185,129,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── CUSTOM SCROLLBAR ── */
  ::-webkit-scrollbar { width: 0; height: 0; }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInScale {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0.5; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes slideDown {
    from { transform: translateY(-10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow); }
    50% { box-shadow: 0 0 0 6px rgba(16,185,129,0); }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }

  .animate-in { animation: fadeIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
  .animate-in-scale { animation: fadeInScale 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards; }

  /* ── HEADER ── */
  .header {
    background: var(--glass);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border-bottom: 1px solid var(--glass-border);
    padding: 14px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-back {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-primary);
    width: 38px;
    height: 38px;
    border-radius: 12px;
    font-size: 16px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s ease;
  }
  .header-back.visible { display: flex; }
  .header-back:active { transform: scale(0.92); background: var(--surface-light); }

  .header-title { flex: 1; }
  .header-title h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 19px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-light) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-title p {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 3px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  .header-add {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
    border: none;
    color: #000;
    width: 38px;
    height: 38px;
    border-radius: 12px;
    font-size: 22px;
    font-weight: 300;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(16,185,129,0.35), 0 0 0 1px rgba(16,185,129,0.2);
    transition: all 0.2s ease;
    animation: pulseGlow 3s ease-in-out infinite;
  }
  .header-add:active { transform: scale(0.92); box-shadow: 0 1px 6px rgba(16,185,129,0.25); }

  /* ── SCREENS ── */
  .screen {
    display: none;
    padding: 16px 18px;
    animation: fadeIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .screen.active { display: block; }

  /* ── SEARCH ── */
  .search-wrap {
    position: relative;
    margin-bottom: 18px;
  }
  .search-wrap input {
    width: 100%;
    padding: 14px 16px 14px 46px;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    background: var(--surface);
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
    outline: none;
    box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,0.03);
    transition: all 0.25s ease;
  }
  .search-wrap input::placeholder { color: var(--text-muted); font-weight: 400; }
  .search-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow), var(--shadow-sm);
    background: var(--bg-elevated);
  }
  .search-wrap .icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    color: var(--text-muted);
    pointer-events: none;
    transition: color 0.25s;
  }
  .search-wrap input:focus ~ .icon { color: var(--accent); }

  /* ── STATS BAR ── */
  .stats-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-chip {
    flex: 1;
    background: linear-gradient(145deg, var(--surface) 0%, var(--bg-elevated) 100%);
    border-radius: var(--radius-sm);
    padding: 14px 10px;
    text-align: center;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    position: relative;
    overflow: hidden;
    transition: all 0.25s ease;
  }
  .stat-chip::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent-light));
    opacity: 0.6;
  }
  .stat-chip:active { transform: scale(0.97); }
  .stat-chip .num {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--accent-light);
    line-height: 1;
    letter-spacing: -0.03em;
  }
  .stat-chip .lbl {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::before {
    content: '';
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent);
  }

  /* ── PATIENT CARDS ── */
  .patient-card {
    background: linear-gradient(145deg, var(--surface) 0%, rgba(26,34,54,0.8) 100%);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
    overflow: hidden;
  }
  .patient-card::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 3px;
    height: 100%;
    background: linear-gradient(180deg, var(--accent), var(--accent-light));
    opacity: 0;
    transition: opacity 0.3s;
  }
  .patient-card:active { transform: scale(0.97); }
  .patient-card:hover::after,
  .patient-card:active::after { opacity: 1; }

  .patient-avatar {
    width: 56px;
    height: 56px;
    border-radius: var(--radius-sm);
    object-fit: cover;
    flex-shrink: 0;
    background: linear-gradient(135deg, var(--surface-light) 0%, var(--bg-elevated) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    overflow: hidden;
    border: 2px solid var(--border-strong);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    position: relative;
  }
  .patient-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .patient-avatar::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1.5px;
    background: linear-gradient(135deg, var(--accent), transparent 60%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0.5;
  }

  .patient-info { flex: 1; min-width: 0; }
  .patient-name {
    font-weight: 700;
    font-size: 15px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }
  .patient-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 3px;
    font-weight: 500;
  }
  .patient-badges {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .badge {
    font-size: 10px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.02em;
    border: 1px solid transparent;
  }
  .badge-especie {
    background: var(--accent-dim);
    color: var(--accent-light);
    border-color: rgba(16,185,129,0.15);
  }
  .badge-alerta {
    background: var(--warning-dim);
    color: var(--warning);
    border-color: rgba(245,158,11,0.15);
  }

  .patient-arrow {
    font-size: 18px;
    color: var(--text-muted);
    flex-shrink: 0;
    font-weight: 300;
    transition: all 0.2s;
  }
  .patient-card:active .patient-arrow { color: var(--accent); transform: translateX(2px); }

  /* ── FICHA PACIENTE ── */
  .ficha-hero {
    background: linear-gradient(145deg, var(--surface) 0%, rgba(26,34,54,0.9) 100%);
    border-radius: var(--radius-lg);
    padding: 22px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow), var(--shadow-glow);
    display: flex;
    gap: 18px;
    align-items: flex-start;
    position: relative;
    overflow: hidden;
  }
  .ficha-hero::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -50%;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
    opacity: 0.4;
    pointer-events: none;
  }

  .ficha-avatar {
    width: 84px;
    height: 84px;
    border-radius: var(--radius);
    object-fit: cover;
    flex-shrink: 0;
    background: linear-gradient(135deg, var(--surface-light), var(--bg-elevated));
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    overflow: hidden;
    border: 2px solid var(--accent);
    box-shadow: 0 4px 16px rgba(16,185,129,0.2);
    position: relative;
    z-index: 1;
  }
  .ficha-avatar img { width: 100%; height: 100%; object-fit: cover; }

  .ficha-datos { flex: 1; position: relative; z-index: 1; }
  .ficha-datos h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.15;
    color: var(--text-primary);
  }
  .ficha-datos .especie {
    font-size: 12px;
    color: var(--accent-light);
    font-weight: 600;
    margin-top: 4px;
    letter-spacing: 0.02em;
  }
  .ficha-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 14px;
  }
  .ficha-item {
    background: rgba(255,255,255,0.03);
    border-radius: var(--radius-xs);
    padding: 10px 12px;
    border: 1px solid var(--border);
  }
  .ficha-item label {
    font-size: 9px;
    color: var(--text-muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: block;
    margin-bottom: 3px;
  }
  .ficha-item span {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
  }

  .dueno-card {
    background: linear-gradient(135deg, var(--accent-dim) 0%, rgba(16,185,129,0.05) 100%);
    border: 1px solid rgba(16,185,129,0.12);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    backdrop-filter: blur(8px);
  }
  .dueno-card .icon {
    font-size: 22px;
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: var(--accent-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(16,185,129,0.15);
  }
  .dueno-card .dueno-info h4 { font-size: 14px; font-weight: 700; color: var(--text-primary); }
  .dueno-card .dueno-info p { font-size: 12px; color: var(--text-muted); margin-top: 2px; font-weight: 500; }

  /* ── TABS ── */
  .tabs-wrap {
    overflow-x: auto;
    scrollbar-width: none;
    margin-bottom: 18px;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 4px;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tabs {
    display: flex;
    gap: 8px;
    width: max-content;
    padding: 2px;
  }
  .tab-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 9px 18px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1);
    box-shadow: var(--shadow-sm);
    letter-spacing: 0.01em;
  }
  .tab-btn:active { transform: scale(0.94); }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
    color: #000;
    border-color: transparent;
    box-shadow: 0 2px 12px rgba(16,185,129,0.35);
    font-weight: 700;
  }

  /* ── TIMELINE ── */
  .timeline { position: relative; padding-left: 8px; }
  .timeline::before {
    content: '';
    position: absolute;
    left: 19px;
    top: 8px;
    bottom: 80px;
    width: 2px;
    background: linear-gradient(180deg, var(--accent) 0%, var(--surface-light) 50%, transparent 100%);
    opacity: 0.3;
  }

  .evento-card {
    background: linear-gradient(145deg, var(--surface) 0%, rgba(26,34,54,0.8) 100%);
    border-radius: var(--radius-sm);
    padding: 16px;
    margin-bottom: 12px;
    margin-left: 28px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    position: relative;
    animation: fadeIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    opacity: 0;
  }
  .evento-card:nth-child(1) { animation-delay: 0.05s; }
  .evento-card:nth-child(2) { animation-delay: 0.1s; }
  .evento-card:nth-child(3) { animation-delay: 0.15s; }
  .evento-card:nth-child(4) { animation-delay: 0.2s; }
  .evento-card:nth-child(5) { animation-delay: 0.25s; }
  .evento-card:nth-child(6) { animation-delay: 0.3s; }

  .evento-card::before {
    content: '';
    position: absolute;
    left: -22px;
    top: 20px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--surface);
    border: 2.5px solid var(--accent);
    box-shadow: 0 0 0 3px var(--bg), 0 0 8px var(--accent-glow);
    z-index: 2;
  }
  .evento-card.vacuna::before { border-color: var(--info); box-shadow: 0 0 0 3px var(--bg), 0 0 8px rgba(59,130,246,0.3); }
  .evento-card.cirugia::before { border-color: var(--danger); box-shadow: 0 0 0 3px var(--bg), 0 0 8px rgba(244,63,94,0.3); }
  .evento-card.receta::before { border-color: var(--purple); box-shadow: 0 0 0 3px var(--bg), 0 0 8px rgba(167,139,250,0.3); }
  .evento-card.desparasitacion::before { border-color: var(--warning); box-shadow: 0 0 0 3px var(--bg), 0 0 8px rgba(245,158,11,0.3); }

  .evento-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .evento-icon {
    font-size: 16px;
    width: 32px;
    height: 32px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent-dim);
  }
  .evento-card.vacuna .evento-icon { background: var(--info-dim); }
  .evento-card.cirugia .evento-icon { background: var(--danger-dim); }
  .evento-card.receta .evento-icon { background: var(--purple-dim); }
  .evento-card.desparasitacion .evento-icon { background: var(--warning-dim); }

  .evento-tipo {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent-light);
  }
  .evento-card.vacuna .evento-tipo { color: #60a5fa; }
  .evento-card.cirugia .evento-tipo { color: #fb7185; }
  .evento-card.receta .evento-tipo { color: #c4b5fd; }
  .evento-card.desparasitacion .evento-tipo { color: #fbbf24; }

  .evento-fecha {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    background: rgba(255,255,255,0.04);
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }
  .evento-titulo {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }
  .evento-detalle {
    font-size: 12px;
    color: var(--text-secondary);
    line-height: 1.65;
    font-weight: 400;
  }
  .evento-proxima {
    margin-top: 10px;
    font-size: 11px;
    background: linear-gradient(135deg, var(--warning-dim) 0%, rgba(245,158,11,0.05) 100%);
    border-radius: var(--radius-xs);
    padding: 8px 12px;
    color: var(--warning);
    font-weight: 600;
    border: 1px solid rgba(245,158,11,0.12);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 50px 24px;
    color: var(--text-muted);
  }
  .empty-state .emoji {
    font-size: 44px;
    margin-bottom: 14px;
    opacity: 0.6;
    filter: grayscale(0.3);
  }
  .empty-state p {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
  }

  /* ── FAB ── */
  .fab-evento {
    position: fixed;
    bottom: 24px;
    right: 20px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
    color: #000;
    border: none;
    border-radius: var(--radius);
    padding: 15px 22px;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(16,185,129,0.4), 0 0 0 1px rgba(16,185,129,0.2);
    display: none;

  { id:10, pacienteId:5, tipo:"consulta", fecha:"2024-10-18", motivo:"Cojera miembro posterior derecho", diagnostico:"Distensi\u00f3n ligamentosa", tratamiento:"Reposo absoluto 15 d\u00edas, Meloxicam 0.1mg/kg c/24hs", obs:"Rx sin fracturas." },
  { id:11, pacienteId:5, tipo:"desparasitacion", fecha:"2024-09-01", producto:"Frontline Plus", dosis:"1 pipeta grande", via:"T\u00f3pica", proxAplicacion:"2024-12-01" },
  { id:12, pacienteId:8, tipo:"consulta", fecha:"2024-11-12", motivo:"Otitis bilateral", diagnostico:"Otitis externa bacteriana", tratamiento:"Limpieza con Epiotic, Otomax gotas c/12hs por 10 d\u00edas", obs:"Alergia ambiental posible." },
];

let pacientesData = [...pacientes];
let eventosData = [...eventos];
let pacienteActual = null;
let tipoEventoSeleccionado = "consulta";

// ── RENDER LISTA ────────────────────────────────────────────────────
function calcularEdad(nacimiento) {
  if (!nacimiento) return "\u2013";
  const hoy = new Date();
  const nac = new Date(nacimiento);
  const a\u00f1os = hoy.getFullYear() - nac.getFullYear();
  const meses = hoy.getMonth() - nac.getMonth();
  if (a\u00f1os === 0) return `${hoy.getMonth() - nac.getMonth() + (meses < 0 ? 12 : 0)} meses`;
  return `${a\u00f1os} a\u00f1o${a\u00f1os !== 1 ? "s" : ""}`;
}

function emojiEspecie(especie) {
  const m = especie.match(/^\S+/);
  return m ? m[0] : "🐾";
}

function renderLista(lista) {
  const cont = document.getElementById('lista-pacientes');
  const noRes = document.getElementById('no-results');
  if (lista.length === 0) {
    cont.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';
  cont.innerHTML = lista.map((p, i) => {
    const evsPac = eventosData.filter(e => e.pacienteId === p.id);
    const proxVac = evsPac.find(e => e.tipo === 'vacuna' && e.proxRefuerzo && new Date(e.proxRefuerzo) <= new Date(Date.now() + 30*24*3600*1000));
    const avatar = p.foto
      ? `<div class="patient-avatar"><img src="${p.foto}" alt="${p.nombre}" loading="lazy"></div>`
      : `<div class="patient-avatar">${emojiEspecie(p.especie)}</div>`;
    return `
    <div class="patient-card" onclick="abrirFicha(${p.id})" style="animation-delay: ${i * 0.04}s">
      ${avatar}
      <div class="patient-info">
        <div class="patient-name">${p.nombre}</div>
        <div class="patient-sub">👤 ${p.dueno} \u00b7 ${calcularEdad(p.nacimiento)}</div>
        <div class="patient-badges">
          <span class="badge badge-especie">${p.especie}</span>
          ${proxVac ? `<span class="badge badge-alerta">\u23f0 Refuerzo pronto</span>` : ''}
        </div>
      </div>
      <div class="patient-arrow">\u203a</div>
    </div>`;
  }).join('');
  // Add animation class to cards
  cont.querySelectorAll('.patient-card').forEach(c => c.classList.add('animate-in'));
}

function filtrarPacientes(q) {
  const txt = q.toLowerCase().trim();
  if (!txt) { renderLista(pacientesData); return; }
  renderLista(pacientesData.filter(p =>
    p.nombre.toLowerCase().includes(txt) ||
    p.dueno.toLowerCase().includes(txt) ||
    p.raza.toLowerCase().includes(txt)
  ));
}

// ── FICHA PACIENTE ─────────────────────────────────────────────
function abrirFicha(id) {
  pacienteActual = pacientesData.find(p => p.id === id);
  renderFicha();
  document.getElementById('screen-lista').classList.remove('active');
  document.getElementById('screen-ficha').classList.add('active');
  document.getElementById('btnBack').classList.add('visible');
  document.getElementById('btnAdd').style.display = 'none';
  document.getElementById('fabEvento').classList.add('visible');
  document.getElementById('headerTitle').textContent = pacienteActual.nombre;
  document.getElementById('headerSub').textContent = pacienteActual.especie + ' \u00b7 ' + pacienteActual.raza;
  window.scrollTo(0,0);
}

function volverLista() {
  document.getElementById('screen-ficha').classList.remove('active');
  document.getElementById('screen-lista').classList.add('active');
  document.getElementById('btnBack').classList.remove('visible');
  document.getElementById('btnAdd').style.display = '';
  document.getElementById('fabEvento').classList.remove('visible');
  document.getElementById('headerTitle').textContent = 'Los Lapachos';
  document.getElementById('headerSub').textContent = 'Historia Cl\u00ednica';
  pacienteActual = null;
}

function renderFicha() {
  const p = pacienteActual;
  const avatar = p.foto
    ? `<div class="ficha-avatar"><img src="${p.foto}" alt="${p.nombre}"></div>`
    : `<div class="ficha-avatar">${emojiEspecie(p.especie)}</div>`;

  const html = `
    <div style="height:6px"></div>
    <div class="ficha-hero">
      ${avatar}
      <div class="ficha-datos">
        <h2>${p.nombre}</h2>
        <div class="especie">${p.especie} \u00b7 ${p.raza}</div>
        <div class="ficha-grid">
          <div class="ficha-item"><label>Sexo</label><span>${p.sexo}</span></div>
          <div class="ficha-item"><label>Edad</label><span>${calcularEdad(p.nacimiento)}</span></div>
          <div class="ficha-item"><label>Nacimiento</label><span>${p.nacimiento ? formatFecha(p.nacimiento) : '\u2013'}</span></div>
          <div class="ficha-item"><label>Color</label><span>${p.color || '\u2013'}</span></div>
        </div>
      </div>
    </div>

    <div class="dueno-card">
      <div class="icon">👤</div>
      <div class="dueno-info">
        <h4>${p.dueno}</h4>
        <p>📞 ${p.tel} \u00b7 📍 ${p.dir}</p>
      </div>
    </div>

    <div class="tabs-wrap">
      <div class="tabs">
        <button class="tab-btn active" onclick="cambiarTab(this,'todos')">Todo</button>
        <button class="tab-btn" onclick="cambiarTab(this,'consulta')">😷 Consultas</button>
        <button class="tab-btn" onclick="cambiarTab(this,'vacuna')">💉 Vacunas</button>
        <button class="tab-btn" onclick="cambiarTab(this,'cirugia')">🔬 Cirug\u00edas</button>
        <button class="tab-btn" onclick="cambiarTab(this,'receta')">💊 Recetas</button>
        <button class="tab-btn" onclick="cambiarTab(this,'desparasitacion')">🐛 Desparasitaciones</button>
      </div>
    </div>

    <div id="timeline-eventos"></div>
  `;
  document.getElementById('ficha-contenido').innerHTML = html;
  renderTimeline('todos');
}

function cambiarTab(btn, tipo) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTimeline(tipo);
}

function renderTimeline(tipo) {
  const cont = document.getElementById('timeline-eventos');
  let evs = eventosData.filter(e => e.pacienteId === pacienteActual.id);
  if (tipo !== 'todos') evs = evs.filter(e => e.tipo === tipo);
  evs.sort((a,b) => new Date(b.fecha) - new Date(a.fecha));

  if (evs.length === 0) {
    cont.innerHTML = `<div class="empty-state"><div class="emoji">📂</div><p>No hay registros en esta categor\u00eda</p></div>`;
    return;
  }

  cont.innerHTML = '<div class="timeline">' + evs.map(ev => renderEvento(ev)).join('') + '</div><div style="height:80px"></div>';
}

function renderEvento(ev) {
  const iconos = { consulta:'😷', vacuna:'💉', cirugia:'🔬', receta:'💊', desparasitacion:'🐛' };
  const labels = { consulta:'Consulta', vacuna:'Vacuna', cirugia:'Cirug\u00eda / Procedimiento', receta:'Receta', desparasitacion:'Desparasitaci\u00f3n' };

  let cuerpo = '';
  if (ev.tipo === 'consulta') {
    cuerpo = `<div class="evento-titulo">${ev.motivo}</div>
    <div class="evento-detalle"><b>Diagn\u00f3stico:</b> ${ev.diagnostico}<br><b>Tratamiento:</b> ${ev.tratamiento}${ev.obs ? `<br><i>${ev.obs}</i>` : ''}</div>`;
  } else if (ev.tipo === 'vacuna') {
    cuerpo = `<div class="evento-titulo">${ev.vacuna}</div>
    <div class="evento-detalle">Dosis: ${ev.dosis} \u00b7 Lote: ${ev.lote}</div>
    ${ev.proxRefuerzo ? `<div class="evento-proxima">\u23f0 Pr\u00f3ximo refuerzo: ${formatFecha(ev.proxRefuerzo)}</div>` : ''}`;
  } else if (ev.tipo === 'cirugia') {
    cuerpo = `<div class="evento-titulo">${ev.procedimiento}</div>
    <div class="evento-detalle"><b>Anestesia:</b> ${ev.anestesia}${ev.obs ? `<br>${ev.obs}` : ''}</div>`;
  } else if (ev.tipo === 'receta') {
    cuerpo = `<div class="evento-titulo">${ev.medicamento}</div>
    <div class="evento-detalle">Dosis: ${ev.dosis} \u00b7 Duraci\u00f3n: ${ev.duracion}<br><i>${ev.indicaciones}</i></div>`;
  } else if (ev.tipo === 'desparasitacion') {
    cuerpo = `<div class="evento-titulo">${ev.producto}</div>
    <div class="evento-detalle">Dosis: ${ev.dosis} \u00b7 V\u00eda: ${ev.via}</div>
    ${ev.proxAplicacion ? `<div class="evento-proxima">\u23f0 Pr\u00f3xima aplicaci\u00f3n: ${formatFecha(ev.proxAplicacion)}</div>` : ''}`;
  }

  return `
  <div class="evento-card ${ev.tipo}">
    <div class="evento-header">
      <span class="evento-icon">${iconos[ev.tipo]}</span>
      <span class="evento-tipo">${labels[ev.tipo]}</span>
      <span class="evento-fecha">${formatFecha(ev.fecha)}</span>
    </div>
    ${cuerpo}
  </div>`;
}

// ── MODAL EVENTO ───────────────────────────────────────────────────
function abrirModalEvento() {
  const hoy = new Date().toISOString().split('T')[0];
  document.getElementById('ev-fecha').value = hoy;
  selTipo(document.querySelector('.tipo-btn'), 'consulta');
  document.getElementById('modalEvento').classList.add('open');
}

function selTipo(btn, tipo) {
  tipoEventoSeleccionado = tipo;
  document.querySelectorAll('.tipo-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.querySelectorAll('.form-evento').forEach(f => f.style.display = 'none');
  document.getElementById('form-' + tipo).style.display = '';
}

function guardarEvento() {
  const fecha = document.getElementById('ev-fecha').value;
  if (!fecha) { mostrarToast('\u26a0\ufe0f Ingres\u00e1 la fecha'); return; }

  let ev = { id: Date.now(), pacienteId: pacienteActual.id, tipo: tipoEventoSeleccionado, fecha };

  if (tipoEventoSeleccionado === 'consulta') {
    ev.motivo = document.getElementById('ev-motivo').value || 'Sin especificar';
    ev.diagnostico = document.getElementById('ev-diagnostico').value || '\u2013';
    ev.tratamiento = document.getElementById('ev-tratamiento').value || '\u2013';
    ev.obs = document.getElementById('ev-obs-consulta').value;
  } else if (tipoEventoSeleccionado === 'vacuna') {
    ev.vacuna = document.getElementById('ev-vacuna').value || 'Sin especificar';
    ev.dosis = document.getElementById('ev-dosis-vac').value || '\u2013';
    ev.lote = document.getElementById('ev-lote').value || '\u2013';
    ev.proxRefuerzo = document.getElementById('ev-prox-vac').value;
  } else if (tipoEventoSeleccionado === 'cirugia') {
    ev.procedimiento = document.getElementById('ev-cirugia').value || 'Sin especificar';
    ev.anestesia = document.getElementById('ev-anestesia').value || '\u2013';
    ev.obs = document.getElementById('ev-obs-cir').value;
  } else if (tipoEventoSeleccionado === 'receta') {
    ev.medicamento = document.getElementById('ev-medicamento').value || 'Sin especificar';
    ev.dosis = document.getElementById('ev-dosis-rec').value || '\u2013';
    ev.duracion = document.getElementById('ev-duracion').value || '\u2013';
    ev.indicaciones = document.getElementById('ev-indicaciones').value || '';
  } else if (tipoEventoSeleccionado === 'desparasitacion') {
    ev.producto = document.getElementById('ev-producto').value || 'Sin especificar';
    ev.dosis = document.getElementById('ev-dosis-des').value || '\u2013';
    ev.via = document.getElementById('ev-via').value;
    ev.proxAplicacion = document.getElementById('ev-prox-des').value;
  }

  eventosData.push(ev);
  cerrarModal('modalEvento');
  renderTimeline(document.querySelector('.tab-btn.active')?.textContent.includes('Todo') ? 'todos' : tipoEventoSeleccionado);
  mostrarToast('\u2705 Registro guardado');
}

// ── MODAL PACIENTE ──────────────────────────────────────────────────
function abrirModalPaciente() {
  document.getElementById('modalPaciente').classList.add('open');
}

function guardarPaciente() {
  const nombre = document.getElementById('np-nombre').value.trim();
  const dueno = document.getElementById('np-dueno').value.trim();
  if (!nombre) { mostrarToast('\u26a0\ufe0f Ingres\u00e1 el nombre del paciente'); return; }

  const nuevo = {
    id: Date.now(),
    nombre,
    especie: document.getElementById('np-especie').value,
    raza: document.getElementById('np-raza').value || 'Mestizo',
    sexo: document.getElementById('np-sexo').value,
    nacimiento: document.getElementById('np-nacimiento').value,
    color: document.getElementById('np-color').value,
    foto: null,
    dueno: dueno || 'Sin especificar',
    tel: document.getElementById('np-tel').value || '\u2013',
    dir: document.getElementById('np-dir').value || '\u2013',
  };

  pacientesData.push(nuevo);
  document.getElementById('statTotal').textContent = pacientesData.length;
  cerrarModal('modalPaciente');
  renderLista(pacientesData);
  mostrarToast('\u2705 Paciente registrado: ' + nombre);

  ['np-nombre','np-raza','np-color','np-nacimiento','np-dueno','np-tel','np-dir'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

// ── UTILS ─────────────────────────────────────────────────────────────
function cerrarModal(id) {
  document.getElementById(id).classList.remove('open');
}

function formatFecha(fecha) {
  if (!fecha) return '\u2013';
  const [y,m,d] = fecha.split('-');
  return `${d}/${m}/${y}`;
}

function mostrarToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// cerrar modales tocando fuera
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

// ── INIT ──────────────────────────────────────────────────────────────
renderLista(pacientesData);
</script>
</body>
</html>
